name: Deploy to GitHub Pages

# Publishes the static app to GitHub Pages on every push to main.
# One-time setup: Repo → Settings → Pages → "Build and deployment" →
# Source: "GitHub Actions". After that this runs automatically.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp asset version (cache-busting)
        # Rewrite every ?v=… in index.html to this commit's short SHA so each
        # deploy serves fresh JS/CSS automatically — no manual version bump.
        run: |
          sed -i -E "s/\?v=[0-9A-Za-z._-]+/?v=${GITHUB_SHA::8}/g" index.html
          echo "Stamped assets with ?v=${GITHUB_SHA::8}"
          grep -o 'assets/js/app.js?v=[0-9A-Za-z._-]*' index.html || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo root is the site; index.html lives at the root.
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
